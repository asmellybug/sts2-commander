<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS2 战略指挥官</title>
<style>
  :root {
    --bg: #0a0610;
    --panel: #15102a;
    --card: #1c1535;
    --border: #5a3d8a;
    --accent: #9b6fd4;
    --accent2: #c9a0f0;
    --gold: #d4a840;
    --text: #ddd0e8;
    --dim: #a89ab8;
    --hp: #e74c3c;
    --buff: #45c480;
    --block: #5dade2;
    --debuff: #d47a30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .window {
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--panel);
    min-height: 100vh;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #1a1030, #251845);
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .titlebar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .titlebar-close {
    color: var(--hp);
    font-size: 16px;
    cursor: pointer;
    width: 20px;
    text-align: center;
  }
  .titlebar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
  }
  .titlebar-status {
    font-size: 11px;
    color: var(--dim);
  }

  .char-sheet {
    display: flex;
    gap: 16px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(90, 61, 138, 0.4);
    background: rgba(28, 21, 53, 0.5);
    flex-wrap: wrap;
  }
  .char-stat {
    font-size: 12px;
    color: var(--dim);
  }
  .char-stat .val {
    color: var(--text);
    font-weight: 600;
  }
  .char-stat .val.hp { color: var(--hp); }
  .char-stat .val.gold { color: var(--gold); }
  .char-stat .val.green { color: var(--buff); }
  .char-stat .val.blue { color: var(--block); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: rgba(21, 16, 42, 0.8);
  }
  .tab {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--gold);
    background: rgba(155, 111, 212, 0.08);
  }

  .content {
    padding: 14px;
  }

  .divider {
    border: none;
    border-top: 1px solid rgba(90, 61, 138, 0.35);
    margin: 12px 0;
  }

  .section-title {
    font-size: 12px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .textbox {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .textbox .highlight { color: var(--accent2); font-weight: 600; }
  .textbox .gold { color: var(--gold); font-weight: 600; }
  .textbox .warn { color: var(--hp); }
  .textbox .buff { color: var(--buff); }
  .textbox .blue { color: var(--block); }
  .textbox .debuff { color: var(--debuff); }
  .textbox .dim { color: var(--dim); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
  }
  .card-item .card-name {
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .card-item .card-cost {
    color: var(--gold);
    font-size: 11px;
  }
  .card-item .card-desc {
    color: var(--dim);
    font-size: 11px;
    margin-top: 3px;
  }
  .card-item .card-price {
    color: var(--gold);
    font-size: 11px;
    margin-top: 4px;
  }
  .card-item.recommended {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(212, 168, 64, 0.2);
  }

  .ask-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .ask-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .ask-input::placeholder { color: var(--dim); }
  .ask-input:focus { border-color: var(--accent); }

  .btn {
    background: linear-gradient(135deg, var(--accent), #7b50b8);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
  .btn.gold-btn {
    background: linear-gradient(135deg, var(--gold), #b8902e);
  }

  .enemy-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .enemy-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    flex: 1;
    min-width: 200px;
  }
  .enemy-name {
    color: var(--hp);
    font-weight: 600;
    font-size: 13px;
  }

  .hp-bar-outer {
    background: rgba(90, 61, 138, 0.25);
    border-radius: 3px;
    height: 8px;
    margin: 6px 0;
    overflow: hidden;
  }
  .hp-bar-inner {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--hp), #c0392b);
  }

  .hand-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .hand-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    min-width: 100px;
  }
  .hand-card .hc-name {
    color: var(--accent2);
    font-weight: 600;
  }
  .hand-card .hc-cost {
    color: var(--gold);
    font-size: 11px;
  }
  .hand-card .hc-desc {
    color: var(--dim);
    font-size: 11px;
  }
  .hand-card.play-order {
    border-color: var(--gold);
    position: relative;
  }
  .hand-card .order-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--gold);
    color: #0a0610;
    font-size: 10px;
    font-weight: 700;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .route-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .route-block.recommended {
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(212, 168, 64, 0.15);
  }
  .route-label {
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 4px;
  }
  .route-nodes {
    color: var(--dim);
    font-size: 12px;
  }
  .route-nodes .node-elite { color: var(--hp); }
  .route-nodes .node-rest { color: var(--buff); }
  .route-nodes .node-shop { color: var(--gold); }
  .route-nodes .node-event { color: var(--accent); }
  .route-nodes .node-enemy { color: var(--debuff); }

  .event-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .event-title {
    color: var(--accent2);
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .event-desc {
    color: var(--text);
    font-size: 13px;
    line-height: 1.7;
  }
  .option-block {
    background: rgba(28, 21, 53, 0.7);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .option-block.recommended {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(212, 168, 64, 0.15);
  }
  .option-label {
    color: var(--gold);
    font-weight: 600;
    font-size: 13px;
  }
  .option-desc {
    color: var(--dim);
    font-size: 12px;
    margin-top: 2px;
  }

  .deck-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 6px;
    margin-bottom: 10px;
  }
  .deck-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 7px;
    font-size: 11px;
  }
  .deck-card .dc-name {
    color: var(--accent2);
    font-weight: 600;
  }
  .deck-card .dc-type {
    color: var(--dim);
    font-size: 11px;
  }

  .timeline-item {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .tl-turn {
    color: var(--gold);
    font-weight: 600;
    min-width: 60px;
    text-align: right;
  }
  .tl-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .tl-text {
    color: var(--text);
    flex: 1;
  }
  .tl-text .dim { color: var(--dim); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-box .sb-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
  }
  .stat-box .sb-label {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-close">&times;</span>
      <span class="titlebar-title">STS2 战略指挥官</span>
    </div>
    <span id="titlebar-status" class="titlebar-status">连接中…</span>
  </div>
  <div id="char-sheet" class="char-sheet">
    <span class="char-stat">角色: <span id="cs-char" class="val">—</span></span>
    <span class="char-stat">HP: <span id="cs-hp" class="val hp">—</span></span>
    <span class="char-stat">金币: <span id="cs-gold" class="val gold">—</span></span>
    <span class="char-stat">遗物: <span id="cs-relics" class="val">0</span></span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="situation" onclick="app.setTab('situation')">当前形势</div>
    <div class="tab" data-tab="deck" onclick="app.setTab('deck')">卡组构建</div>
    <div class="tab" data-tab="log" onclick="app.setTab('log')">历史记录</div>
  </div>
  <div id="tab-situation" class="content">
    <div id="scene-content" class="textbox">等待进入游戏…</div>
    <hr class="divider">
    <div class="section-title">AI 决策建议</div>
    <div id="advice-content" class="textbox" style="min-height:80px;">点击「求策」获取 AI 建议</div>
    <div class="ask-row">
      <input id="ask-input" class="ask-input" placeholder="询问 AI 顾问…" onkeydown="if(event.key==='Enter')app.sendQuestion()">
      <button class="btn gold-btn" onclick="app.sendQuestion()">发送</button>
    </div>
    <button id="btn-situation" class="btn" style="width:100%;margin-top:8px;padding:10px;font-size:14px;" onclick="app.analyze('situation')">◆  求策·当前形势  ◆</button>
  </div>
  <div id="tab-deck" class="content" style="display:none">
    <div class="section-title">牌组结构</div>
    <div id="deck-list" class="textbox" style="font-family:Menlo,monospace;font-size:12px;">等待进入游戏…</div>
    <div class="section-title">流派分析</div>
    <div id="deck-analysis" class="textbox">点击下方按钮获取 AI 分析</div>
    <button id="btn-deck" class="btn" style="width:100%;margin-top:8px;padding:10px;font-size:14px;" onclick="app.analyze('deck')">◆  求策·卡组  ◆</button>
  </div>
  <div id="tab-log" class="content" style="display:none">
    <div class="section-title">本局统计</div>
    <div id="log-stats" class="textbox" style="font-family:Menlo,monospace;font-size:12px;">等待游戏数据…</div>
    <div class="section-title">行程记录</div>
    <div id="log-timeline" class="textbox">—</div>
  </div>
</div>

<script>
var app = {
  setTab: function(name) {
    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === name);
    });
    var ids = ['situation', 'deck', 'log'];
    ids.forEach(function(id) {
      var el = document.getElementById('tab-' + id);
      if (el) el.style.display = (id === name) ? '' : 'none';
    });
  },

  updateHeader: function(data) {
    var el;
    el = document.getElementById('cs-char');
    if (el) el.textContent = data.char || '—';
    el = document.getElementById('cs-hp');
    if (el) el.textContent = data.hp !== undefined ? (data.hp + '/' + data.maxHp) : '—';
    el = document.getElementById('cs-gold');
    if (el) el.textContent = data.gold !== undefined ? data.gold : '—';
    el = document.getElementById('cs-relics');
    if (el) el.textContent = data.relics !== undefined ? data.relics : '0';
  },

  updateScene: function(data) {
    var el = document.getElementById('scene-content');
    if (!el) return;
    if (data.type === 'html') {
      el.innerHTML = data.html;
    } else if (data.type === 'combat') {
      el.innerHTML = renderCombat(data);
    } else if (data.type === 'event') {
      el.innerHTML = renderEvent(data);
    } else if (data.type === 'shop') {
      el.innerHTML = renderShop(data);
    } else if (data.type === 'map') {
      el.innerHTML = renderMap(data);
    } else if (data.type === 'card_reward') {
      el.innerHTML = renderCardReward(data);
    } else if (data.type === 'rest') {
      el.innerHTML = renderRest(data);
    } else {
      el.innerHTML = data.html || '';
    }
  },

  updateAdvice: function(html) {
    var el = document.getElementById('advice-content');
    if (el) el.innerHTML = html;
  },

  updateDeckList: function(html) {
    var el = document.getElementById('deck-list');
    if (el) el.innerHTML = html;
  },

  updateDeckAnalysis: function(html) {
    var el = document.getElementById('deck-analysis');
    if (el) el.innerHTML = html;
  },

  updateLogStats: function(html) {
    var el = document.getElementById('log-stats');
    if (el) el.innerHTML = html;
  },

  updateLogTimeline: function(html) {
    var el = document.getElementById('log-timeline');
    if (el) el.innerHTML = html;
  },

  setButtonState: function(id, text, disabled) {
    var el = document.getElementById(id);
    if (el) {
      el.textContent = text;
      el.disabled = !!disabled;
    }
  },

  setConnection: function(text) {
    var el = document.getElementById('titlebar-status');
    if (el) el.textContent = text;
  },

  highlightOption: function(optionName) {
    // Find option-block whose option-label contains optionName, add gold border + star
    var blocks = document.querySelectorAll('.option-block');
    blocks.forEach(function(b) {
      b.classList.remove('recommended');
      var label = b.querySelector('.option-label');
      if (label) {
        // Remove existing stars
        label.textContent = label.textContent.replace(/ ★$/, '');
      }
    });
    if (!optionName) return;
    blocks.forEach(function(b) {
      var label = b.querySelector('.option-label');
      if (label && label.textContent.indexOf(optionName) >= 0) {
        b.classList.add('recommended');
        label.textContent = label.textContent + ' ★';
      }
    });
  },

  analyze: function(type) {
    if (window.pywebview && window.pywebview.api) {
      window.pywebview.api.onAnalyze(type);
    }
  },

  sendQuestion: function() {
    var input = document.getElementById('ask-input');
    if (!input) return;
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    if (window.pywebview && window.pywebview.api) {
      window.pywebview.api.onAsk(text);
    }
  }
};

function renderCombat(data) { return data.html || ''; }
function renderEvent(data) { return data.html || ''; }
function renderShop(data) { return data.html || ''; }
function renderMap(data) { return data.html || ''; }
function renderCardReward(data) { return data.html || ''; }
function renderRest(data) { return data.html || ''; }
</script>

</body>
</html>
